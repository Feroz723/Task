name: Generate Keystore
on:
  workflow_dispatch:
    inputs:
      store_password:
        description: 'Keystore password - remember this, you will need it again'
        required: true
      key_password:
        description: 'Key password - can be the same as store password'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.jks \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=Halo, OU=Dev, O=Halo, L=Bengaluru, S=Karnataka, C=IN"

      - name: Encode keystore as base64
        run: base64 -w 0 release.jks > release.jks.base64.txt

      - name: Upload keystore files
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: |
            release.jks
            release.jks.base64.txt
