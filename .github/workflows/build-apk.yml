name: Build Android APK
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "::error::ANDROID_KEYSTORE_BASE64 is not set"; exit 1; }
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\n\r ' | base64 -d > android/app/release.jks
          FILE_SIZE=$(stat -c%s android/app/release.jks)
          echo "Keystore file size: $FILE_SIZE bytes"
          echo "Keystore SHA256: $(sha256sum android/app/release.jks | cut -d' ' -f1)"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "::error::Keystore file is suspiciously small ($FILE_SIZE bytes). The base64 secret may be truncated or corrupted."
            exit 1
          fi

      - name: Verify signing secrets
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEY_ALIAS="${ANDROID_KEY_ALIAS:-release}"
          KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          test -n "$ANDROID_KEYSTORE_PASSWORD" || (echo "ANDROID_KEYSTORE_PASSWORD is not set" && exit 1)
          test -n "$KEY_ALIAS" || (echo "ANDROID_KEY_ALIAS is not set" && exit 1)
          test -n "$KEY_PASSWORD" || (echo "ANDROID_KEY_PASSWORD is not set" && exit 1)

          keytool -list -v \
            -keystore android/app/release.jks \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" > /dev/null

          TEMP_KEYSTORE="$(mktemp /tmp/release-check-XXXXXX.p12)"
          trap 'rm -f "$TEMP_KEYSTORE"' EXIT

          keytool -importkeystore -noprompt \
            -srckeystore android/app/release.jks \
            -srcstorepass "$ANDROID_KEYSTORE_PASSWORD" \
            -srcalias "$KEY_ALIAS" \
            -srckeypass "$KEY_PASSWORD" \
            -destkeystore "$TEMP_KEYSTORE" \
            -deststoretype PKCS12 \
            -deststorepass "$KEY_PASSWORD" > /dev/null

          echo "Keystore alias and private key validated."

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build signed APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
