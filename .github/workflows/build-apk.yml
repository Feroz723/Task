name: Build Android APK
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "::error::ANDROID_KEYSTORE_BASE64 is not set"; exit 1; }
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\n\r ' | base64 -d > android/app/release.jks
          FILE_SIZE=$(stat -c%s android/app/release.jks)
          echo "Keystore file size: $FILE_SIZE bytes"
          echo "Keystore SHA256: $(sha256sum android/app/release.jks | cut -d' ' -f1)"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "::error::Keystore file is suspiciously small ($FILE_SIZE bytes). The base64 secret may be truncated or corrupted."
            exit 1
          fi

      - name: Verify signing secrets
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEY_ALIAS="${ANDROID_KEY_ALIAS:-release}"
          KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          test -n "$ANDROID_KEYSTORE_PASSWORD" || (echo "ANDROID_KEYSTORE_PASSWORD is not set" && exit 1)
          test -n "$KEY_ALIAS" || (echo "ANDROID_KEY_ALIAS is not set" && exit 1)
          test -n "$KEY_PASSWORD" || (echo "ANDROID_KEY_PASSWORD is not set" && exit 1)

          keytool -list -v \
            -keystore android/app/release.jks \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" > /dev/null

          validate_key_password() {
            local candidate_password="$1"
            local temp_dir
            local temp_keystore
            local temp_log
            temp_dir="$(mktemp -d /tmp/release-check-XXXXXX)"
            temp_keystore="$temp_dir/release-check.p12"
            temp_log="$temp_dir/keytool.log"
            if keytool -importkeystore -noprompt \
              -srckeystore android/app/release.jks \
              -srcstorepass "$ANDROID_KEYSTORE_PASSWORD" \
              -srcalias "$KEY_ALIAS" \
              -srckeypass "$candidate_password" \
              -destkeystore "$temp_keystore" \
              -deststoretype PKCS12 \
              -deststorepass "$candidate_password" \
              -destkeypass "$candidate_password" \
              -destalias "$KEY_ALIAS" > "$temp_log" 2>&1; then
              rm -rf "$temp_dir"
              return 0
            fi
            cat "$temp_log" >&2
            rm -rf "$temp_dir"
            return 1
          }

          if validate_key_password "$KEY_PASSWORD"; then
            EFFECTIVE_KEY_PASSWORD="$KEY_PASSWORD"
          elif [ "$KEY_PASSWORD" != "$ANDROID_KEYSTORE_PASSWORD" ] && validate_key_password "$ANDROID_KEYSTORE_PASSWORD"; then
            EFFECTIVE_KEY_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_PASSWORD secret did not match the private key password."
            echo "Falling back to ANDROID_KEYSTORE_PASSWORD because the keystore uses the same password for both."
          else
            echo "The keystore alias '$KEY_ALIAS' exists, but its private key password does not match the configured secret."
            echo "Update ANDROID_KEY_PASSWORD to the actual key password, or regenerate the keystore and refresh all Android signing secrets."
            exit 1
          fi

          echo "ANDROID_KEY_ALIAS_EFFECTIVE=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD_EFFECTIVE=$EFFECTIVE_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "Keystore alias and private key validated."

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build signed APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS_FALLBACK: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD_FALLBACK: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          export ANDROID_KEY_ALIAS="${ANDROID_KEY_ALIAS_EFFECTIVE:-$ANDROID_KEY_ALIAS_FALLBACK}"
          export ANDROID_KEY_PASSWORD="${ANDROID_KEY_PASSWORD_EFFECTIVE:-$ANDROID_KEY_PASSWORD_FALLBACK}"
          ./gradlew assembleRelease

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
